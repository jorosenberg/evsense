name: Deploy

# Builds the React app and syncs it to S3 + invalidates CloudFront.
# Triggers automatically on every push to main that touches the frontend or this file.
# Run manually via workflow_dispatch to force a redeploy without a code change.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false   # never cancel a deploy mid-flight

jobs:
  # ── 1. Tests (must pass before we touch production) ────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  # ── 2. Build + deploy ───────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
          VITE_OCM_API_KEY: ${{ secrets.VITE_OCM_API_KEY }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get deployment targets from Terraform state
        id: tf
        working-directory: terraform
        run: |
          terraform init -input=false
          echo "bucket=$(terraform output -raw site_bucket_name)" >> $GITHUB_OUTPUT
          echo "dist_id=$(terraform output -raw site_cloudfront_id)" >> $GITHUB_OUTPUT
        env:
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}

      - name: Sync to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://${{ steps.tf.outputs.bucket }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "data/*"
          # HTML and data files: no-cache so deploys are instant
          aws s3 sync dist/ s3://${{ steps.tf.outputs.bucket }}/ \
            --delete \
            --cache-control "no-cache" \
            --include "index.html" \
            --include "data/*"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.dist_id }} \
            --paths "/*"

      - name: Summary
        run: |
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "Site: https://${{ vars.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "Bucket: ${{ steps.tf.outputs.bucket }}" >> $GITHUB_STEP_SUMMARY
          echo "CloudFront: ${{ steps.tf.outputs.dist_id }}" >> $GITHUB_STEP_SUMMARY
