name: CI — Test & Build

# Runs on every PR targeting main, and on direct pushes to feature branches.
# Blocks merge if tests fail or the build produces errors.

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]   # main is handled by deploy.yml
    paths:
      - 'frontend/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node setup ────────────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Install ───────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Unit tests (Vitest) ───────────────────────────────────────────────
      - name: Run unit tests
        run: npm test
        # Tests are pure util functions — no secrets needed

      # ── Production build ──────────────────────────────────────────────────
      - name: Build
        env:
          # Provide dummy values so the build doesn't fail on missing env vars.
          # Real values are only needed at runtime (fetched client-side).
          VITE_FIREBASE_CONFIG: '{"apiKey":"ci-placeholder","projectId":"ci-placeholder"}'
          VITE_OCM_API_KEY: 'ci-placeholder'
        run: npm run build

      # ── Report bundle size ─────────────────────────────────────────────────
      - name: Report bundle size
        run: |
          echo "### Bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh dist/assets/*.js | sort -h | tail -10 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          TOTAL=$(du -sh dist | cut -f1)
          echo "**Total dist size:** $TOTAL" >> $GITHUB_STEP_SUMMARY
